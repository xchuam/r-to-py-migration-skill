display_name: R Package to Python Package Migration
short_description: Migrate an R or CRAN package to Python with parity checks, reviewer notebook support, and documented deviations.
default_prompt: >-
  Migrate this CRAN package into a native Python package by freezing the R
  reference surface first, classifying each subsystem into native rewrite or
  faithful port or temporary parity bridge, and enforcing API parity, test
  parity, and data-model parity through machine-readable function contracts,
  parameter coverage, live R comparisons, reviewer notebooks, and promotion
  gates before merge.
